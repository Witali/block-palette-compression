<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="sampler.title">BPAL Shader Texture Sampler</title>
    <link rel="stylesheet" href="./style.css?v=bpal-catalog-1">
    <link rel="stylesheet" href="./bpal-sampler.css?v=bpal-sampler">
    <link rel="stylesheet" href="./i18n.css">
  </head>
  <body>
    <a class="back-link" href="./index.html" data-i18n="common.homeShort">Home</a>
    <div id="fps-counter" aria-live="polite">0 FPS</div>
    <output id="sampler-stats" class="sampler-stats" aria-live="polite">
      <span data-i18n="sampler.loadingDefaultBpal">Loading default BPAL texture…</span>
    </output>

    <form id="sampler-controls" class="material-controls sampler-controls" aria-label="BPAL sampler controls" data-i18n-aria-label="sampler.controls">
      <label class="bpal-example-control">
        <span data-i18n="common.builtInBpal">Built-in BPAL/BPLM</span>
        <select id="bpal-example" disabled></select>
      </label>

      <label class="bpal-upload">
        <input id="bpal-file" type="file" accept=".bpal,.bplm,application/octet-stream">
        <span data-i18n="common.uploadBpal">Upload BPAL/BPLM</span>
      </label>

      <label class="sampler-control">
        <span data-i18n="sampler.filtering">Filtering</span>
        <select id="filter-mode">
          <option value="nearest">Nearest + mip</option>
          <option value="bilinear">Bilinear + mip</option>
          <option value="trilinear" selected>Trilinear</option>
          <option value="anisotropic">Anisotropic</option>
        </select>
      </label>

      <label class="sampler-control">
        <span data-i18n="sampler.anisotropy">Anisotropy</span>
        <select id="anisotropy" disabled>
          <option value="2">2×</option>
          <option value="4" selected>4×</option>
          <option value="8">8×</option>
        </select>
      </label>

      <label class="sampler-control lod-control">
        <span>LOD bias <output id="lod-bias-value" for="lod-bias">0.0</output></span>
        <input id="lod-bias" type="range" min="-2" max="2" step="0.25" value="0">
      </label>

      <fieldset>
        <legend data-i18n="common.material">Material</legend>
        <label class="material-option">
          <input type="radio" name="material" value="matte" checked>
          <span data-i18n="common.matte">Matte</span>
        </label>
        <label class="material-option">
          <input type="radio" name="material" value="glossy">
          <span data-i18n="common.glossy">Glossy</span>
        </label>
      </fieldset>

      <output id="bpal-status" class="bpal-status" role="status" aria-live="polite">
        <span data-i18n="sampler.loadingDefaultBpal">Loading default BPAL texture…</span>
      </output>
    </form>

    <canvas id="gl-canvas" aria-label="Cube with a programmable BPAL sampler" data-i18n-aria-label="sampler.canvasAria"></canvas>

    <script src="./src/i18n/en.js?v=cube-bpal-catalog-1"></script>
    <script src="./src/i18n/ru.js?v=cube-bpal-catalog-1"></script>
    <script src="./src/i18n/i18n.js"></script>
    <script src="./src/decoders/gpu-jpeg.js"></script>
    <script src="./src/palette/block-palette-format.js?v=multi-palette-1"></script>
    <script src="./src/decoders/bpal-texture.js?v=multi-palette-1"></script>
    <script src="./src/palette/bplm-format.js?v=multi-palette-1"></script>
    <script src="./src/core/textured-cube.js?v=multi-palette-1"></script>
    <script src="./src/pages/cube-wheel-zoom.js?v=2"></script>
    <script src="./src/pages/bpal-example-catalog.js?v=1"></script>
    <script src="./src/pages/cube-bpal-sampler-page.js?v=multi-palette-1"></script>
  </body>
</html>
