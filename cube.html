<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="cube.title">WebGL Rotating Cube</title>
    <link rel="stylesheet" href="./style.css?v=bpal-catalog-1">
    <link rel="stylesheet" href="./i18n.css">
  </head>
  <body>
    <a class="back-link" href="./index.html" data-i18n="common.homeShort">Home</a>
    <div id="fps-counter" aria-live="polite">0 FPS</div>
    <form id="material-controls" class="material-controls" aria-label="Material controls" data-i18n-aria-label="cube.controls">
      <fieldset>
        <legend data-i18n="common.material">Material</legend>
        <label class="material-option">
          <input type="radio" name="material" value="matte" checked>
          <span data-i18n="common.matte">Matte</span>
        </label>
        <label class="material-option">
          <input type="radio" name="material" value="glossy">
          <span data-i18n="common.glossy">Glossy</span>
        </label>
      </fieldset>
      <label class="material-option" title="Use bit-packed integer BPAL textures in WebGL2" data-i18n-title="cube.webgl2CompactTitle">
        <input id="webgl2-compact" type="checkbox" checked>
        <span data-i18n="cube.webgl2Compact">WebGL2 compact</span>
      </label>
      <label class="relief-control">
        <span><span data-i18n="cube.relief">Relief</span> <output id="height-strength-value" for="height-strength">0.60</output></span>
        <input id="height-strength" type="range" min="0" max="1" step="0.05" value="0.60">
      </label>
      <label class="cube-count-control">
        <span data-i18n="cube.count">Cubes</span>
        <select id="cube-count">
          <option value="1" selected>1</option>
          <option value="3">3</option>
          <option value="10">10</option>
          <option value="30">30</option>
          <option value="100">100</option>
        </select>
      </label>
      <label class="bpal-example-control">
        <span data-i18n="common.builtInBpal">Built-in BPAL/BPLM</span>
        <select id="bpal-example" disabled></select>
      </label>
      <label class="bpal-upload">
        <input id="bpal-file" type="file" accept=".bpal,.bplm,application/octet-stream">
        <span data-i18n="common.uploadBpal">Upload BPAL/BPLM</span>
      </label>
      <label class="material-option" title="Assign a texture instance to every cube" data-i18n-title="cube.perCubeTexturesTitle">
        <input id="per-cube-textures" type="checkbox" checked disabled>
        <span data-i18n="cube.perCubeTextures">Texture per cube</span>
      </label>
      <output id="bpal-status" class="bpal-status" role="status" aria-live="polite" data-i18n="cube.loadingDefaultBpal">Loading default BPAL texture…</output>
    </form>
    <canvas id="gl-canvas" aria-label="Rotating WebGL cube" data-i18n-aria-label="cube.canvasAria"></canvas>
    <script src="./src/i18n/en.js?v=compact-bpal-1"></script>
    <script src="./src/i18n/ru.js?v=compact-bpal-1"></script>
    <script src="./src/i18n/i18n.js"></script>
    <script src="./src/decoders/gpu-jpeg.js"></script>
    <script src="./src/palette/block-palette-format.js?v=block-palette-3"></script>
    <script src="./src/decoders/bpal-texture.js?v=compact-bpal-1"></script>
    <script src="./src/palette/bplm-format.js?v=bplm-1"></script>
    <script src="./src/core/textured-cube.js?v=compact-bpal-1"></script>
    <script src="./src/core/textured-cube-webgl2.js?v=compact-bpal-1"></script>
    <script src="./src/pages/cube-wheel-zoom.js?v=2"></script>
    <script src="./src/pages/cube-grid-layout.js?v=multi-cube-1"></script>
    <script src="./src/pages/bpal-example-catalog.js?v=1"></script>
    <script src="./src/pages/cube-page.js?v=compact-bpal-2"></script>
  </body>
</html>
