<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="viewer.title">BPAL Viewer</title>
    <link rel="stylesheet" href="./bpal-viewer.css">
    <link rel="stylesheet" href="./i18n.css">
  </head>
  <body>
    <main class="viewer-shell">
      <header class="page-header">
        <div>
          <a class="back-link" href="./index.html" data-i18n="common.home">← Home</a>
          <h1 data-i18n="viewer.title">BPAL Viewer</h1>
          <p data-i18n="viewer.description">View BPAL files and regular images with zooming and free panning.</p>
        </div>

        <div class="source-controls">
          <label class="example-picker">
            <span data-i18n="viewer.builtInImage">Built-in image</span>
            <select id="example-image">
              <option value="./assets/bpal/landscape-alaska.bpal" selected>landscape-alaska.bpal</option>
              <option value="./assets/bpal/landscape-alaska-1.75bpp.bpal">landscape-alaska-1.75bpp.bpal</option>
              <option value="./assets/bpal/clipart-apple.bpal">clipart-apple.bpal</option>
              <option value="./assets/bpal/IMG_20260512_194811.bpal">IMG_20260512_194811.bpal</option>
              <option value="./assets/bpal/IMG_20260531_225527.bpal">IMG_20260531_225527.bpal</option>
              <option value="./assets/bpal/stone-texture-wic-2.08bpp.bpal">stone-texture-wic-2.08bpp.bpal</option>
              <option value="./assets/bpal/stone-texture-wic-2.38bpp.bpal">stone-texture-wic-2.38bpp.bpal</option>
            </select>
          </label>

          <button id="upload-button" class="primary-button" type="button" data-i18n="viewer.upload">Upload image</button>
          <input id="file-input" type="file" accept=".bpal,image/*" hidden>
        </div>
      </header>

      <section class="viewer-card" aria-labelledby="viewer-title">
        <div class="viewer-toolbar">
          <div class="file-info">
            <h2 id="viewer-title" data-i18n="viewer.image">Image</h2>
            <span id="status" role="status" aria-live="polite" data-i18n="viewer.choose">Choose a BPAL file or a regular image</span>
          </div>

          <div class="toolbar-controls" aria-label="Image controls" data-i18n-aria-label="viewer.controls">
            <div class="zoom-controls" aria-label="Zoom" data-i18n-aria-label="viewer.zoom">
              <button id="zoom-out" type="button" title="Zoom out" data-i18n-title="viewer.zoomOut" disabled>−</button>
              <output id="zoom-level" aria-label="Current zoom" data-i18n-aria-label="viewer.currentZoom">100%</output>
              <button id="zoom-in" type="button" title="Zoom in" data-i18n-title="viewer.zoomIn" disabled>+</button>
              <button id="actual-size" class="text-button" type="button" disabled>1:1</button>
              <button id="fit-image" class="text-button" type="button" data-i18n="viewer.fit" disabled>Fit</button>
            </div>

            <div class="pan-controls" aria-label="Pan image" data-i18n-aria-label="viewer.pan">
              <button id="pan-left" type="button" title="Pan left" data-i18n-title="viewer.panLeft" disabled>←</button>
              <button id="pan-up" type="button" title="Pan up" data-i18n-title="viewer.panUp" disabled>↑</button>
              <button id="pan-down" type="button" title="Pan down" data-i18n-title="viewer.panDown" disabled>↓</button>
              <button id="pan-right" type="button" title="Pan right" data-i18n-title="viewer.panRight" disabled>→</button>
            </div>
          </div>
        </div>

        <div
          id="image-viewport"
          class="image-viewport"
          tabindex="0"
          aria-label="Image viewport. Drag or use the arrow keys to pan."
          data-i18n-aria-label="viewer.viewportAria"
        >
          <div id="empty-state" class="empty-state">
            <strong data-i18n="viewer.drop">Drop a file here</strong>
            <span data-i18n="viewer.formats">Supports BPAL and image formats available in your browser</span>
          </div>
          <div id="image-stage" class="image-stage" hidden>
            <canvas id="image-canvas"></canvas>
          </div>
        </div>

        <p class="viewer-hint" data-i18n="viewer.hint">Two fingers or Ctrl + mouse wheel — zoom · drag — pan · arrow keys — scroll</p>
      </section>
    </main>

    <script src="./src/i18n/en.js?v=bpal-viewer-3"></script>
    <script src="./src/i18n/ru.js?v=bpal-viewer-3"></script>
    <script src="./src/i18n/i18n.js"></script>
    <script src="./src/palette/block-palette-format.js?v=bpal-viewer-1"></script>
    <script src="./src/pages/bpal-viewer-page.js?v=bpal-viewer-5"></script>
  </body>
</html>
